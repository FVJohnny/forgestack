<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Mirrors the in-app Wordmark glyph: forged-steel tile with a faint molten
       border + glow, literal [ ] bracket characters, and a solid molten "F". -->
  <rect x="14" y="14" width="152" height="152" rx="40"
        fill="#ff5a1f" fill-opacity="0.04"
        stroke="#ff5a1f" stroke-opacity="0.40" stroke-width="5"/>
  <g font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace"
     font-weight="700" text-anchor="middle">
    <!-- corner brackets (match text-primary/40) -->
    <text x="46" y="58" font-size="34" fill="#ff5a1f" fill-opacity="0.42">[</text>
    <text x="134" y="142" font-size="34" fill="#ff5a1f" fill-opacity="0.42">]</text>
    <!-- the F (solid molten primary) -->
    <text x="90" y="118" font-size="96" fill="#ff5a1f">F</text>
  </g>
</svg>